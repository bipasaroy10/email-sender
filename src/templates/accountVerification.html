<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Account Verification</title>
</head>

<body style="margin:0;padding:0;background:#f4f5f7;font-family:'Segoe UI',Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:40px 0;">

<tr>

<td align="center">

<table width="600" cellpadding="0" cellspacing="0"
style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);">

<tr>

<td style="background:#2563eb;padding:30px;text-align:center;">

<h1 style="color:white;margin:0;">
✅ Verify Your Account
</h1>

<p style="color:#dbeafe;margin-top:8px;">
Activate your account securely
</p>

</td>

</tr>

<tr>

<td style="padding:40px;">

<h2 style="color:#333;">
Hello {{NAME}},
</h2>

<p style="font-size:16px;color:#666;line-height:1.8;">

{{MESSAGE}}

</p>

<div style="text-align:center;margin:35px 0;">

<a href="{{LINK}}"
style="
background:#2563eb;
color:white;
padding:15px 35px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
display:inline-block;
">

Verify Account

</a>

</div>

<p style="color:#777;">
This verification link is valid for 24 hours.
</p>

<p style="color:#777;">
If you didn't create this account, please ignore this email.
</p>

</td>

</tr>

<tr>

<td style="background:#f9fafb;padding:20px;text-align:center;">

<p style="margin:0;font-size:12px;color:#999;">
© 2026 Email Sender Application
</p>

</td>

</tr>

</table>

</td>

</tr>

</table>

</body>

</html>
